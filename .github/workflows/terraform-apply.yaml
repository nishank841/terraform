name: Terraform Apply Per App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/*.tfvars'

env:
  TF_DESTROY: false   # change to false to apply

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push statefiles back

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3️⃣ Setup Terraform
      - uses: hashicorp/setup-terraform@v3

      # 4️⃣ Detect changed tfvars files
      - name: Detect changed tfvars
        id: changed
        run: |
          FILES=""
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(ls apps/*.tfvars 2>/dev/null || true)
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^apps/.*\.tfvars$' || true)
          fi

          FILES=$(echo $FILES | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # 5️⃣ Exit if no changes
      - name: Check for changed apps
        if: ${{ steps.changed.outputs.files == '' }}
        run: |
          echo "No apps changed. Skipping Terraform."
          exit 0

      # 6️⃣ Apply or Destroy per app with per-app state
      - name: Apply or Destroy Terraform per app
        run: |
          mkdir -p statefiles

          for FILE in ${{ steps.changed.outputs.files }}; do
            if [ ! -f "$FILE" ]; then
              echo "File $FILE not found, skipping."
              continue
            fi

            echo "Processing $FILE"

            # Extract project_name from tfvars
            PROJECT=$(grep 'project_name' $FILE | awk -F '"' '{print $2}')
            STATE_FILE="statefiles/${PROJECT}.tfstate"

            echo "Using state file: $STATE_FILE"

            terraform init -backend=false

            if [ "${TF_DESTROY}" = "true" ]; then
              echo "Destroying resources for $PROJECT..."
              terraform destroy -auto-approve \
                -var-file="$FILE" \
                -state="$STATE_FILE"

              # Optional: remove state file after destroy
              rm -f "$STATE_FILE"
            else
              echo "Applying resources for $PROJECT..."
              terraform apply -auto-approve \
                -var-file="$FILE" \
                -state="$STATE_FILE"
            fi
          done

      # 7️⃣ Commit updated state files
      - name: Commit state files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add statefiles/*.tfstate || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Terraform state files"
            git push
          fi
