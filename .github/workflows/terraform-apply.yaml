name: Terraform Apply Per App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/*.tfvars'

env:
  TF_DESTROY: false

jobs:
  terraform:
    # Trigger on push OR if the PR was specifically merged
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Detect changed tfvars
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Compare the PR merge commit against its base
            FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^apps/.*\.tfvars$' || true)
          else
            # Compare current push against the previous commit
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^apps/.*\.tfvars$' || true)
          fi
          
          # Fallback: if FILES is empty (e.g. first push), check the directory
          if [ -z "$FILES" ]; then FILES=$(ls apps/*.tfvars 2>/dev/null || true); fi

          FILES=$(echo $FILES | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      - name: Apply Terraform per app
        if: steps.changed.outputs.files != ''
        run: |
          mkdir -p statefiles
          for FILE in ${{ steps.changed.outputs.files }}; do
            [ ! -f "$FILE" ] && continue
            
            PROJECT=$(grep 'project_name' "$FILE" | awk -F '"' '{print $2}')
            STATE_FILE="statefiles/${PROJECT}.tfstate"

            terraform init -backend=false
            
            if [ "${TF_DESTROY}" = "true" ]; then
              terraform destroy -auto-approve -var-file="$FILE" -state="$STATE_FILE"
            else
              terraform apply -auto-approve -var-file="$FILE" -state="$STATE_FILE"
            fi
          done
