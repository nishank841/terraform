name: Terraform Apply Per App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/*.tfvars'

env:
  TF_DESTROY: false  # default, can be overridden via workflow dispatch or repo secrets

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo with full history
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Configure AWS credentials from repo secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3️⃣ Setup Terraform
      - uses: hashicorp/setup-terraform@v3

      # 4️⃣ Detect changed or new tfvars files
      - name: Detect changed tfvars
        id: changed
        run: |
          FILES=""
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(ls apps/*.tfvars 2>/dev/null || true)
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^apps/.*\.tfvars$' || true)
          fi
          FILES=$(echo $FILES | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # 5️⃣ Fail early if no files changed
      - name: Check for changed apps
        if: ${{ steps.changed.outputs.files == '' }}
        run: |
          echo "No apps changed, skipping Terraform."
          exit 0

      # 6️⃣ Apply or Destroy per app based on TF_DESTROY
      - name: Apply or Destroy Terraform per app
        run: |
          for FILE in ${{ steps.changed.outputs.files }}; do
            if [ ! -f "$FILE" ]; then
              echo "File $FILE does not exist, skipping."
              continue
            fi
            echo "Processing $FILE"

            terraform init

            if [ "${TF_DESTROY}" = "true" ]; then
              echo "Destroying resources for $FILE..."
              terraform destroy -auto-approve -var-file="$FILE"
            else
              echo "Applying resources for $FILE..."
              terraform apply -auto-approve -var-file="$FILE"
            fi
          done
