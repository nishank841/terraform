name: Terraform Apply Per App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/*.tfvars'

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo with full history
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for git diff

      # 2️⃣ Configure AWS credentials from repo secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3️⃣ Setup Terraform
      - uses: hashicorp/setup-terraform@v3

      # 4️⃣ Detect changed or new tfvars files
      - name: Detect changed tfvars
        id: changed
        run: |
          FILES=""
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # First commit or new branch: pick all tfvars
            FILES=$(ls apps/*.tfvars 2>/dev/null || true)
          else
            # Pick only changed tfvars files
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^apps/.*\.tfvars$' || true)
          fi

          # Trim whitespace and join as space-separated
          FILES=$(echo $FILES | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # 5️⃣ Fail early if no files changed
      - name: Check for changed apps
        if: ${{ steps.changed.outputs.files == '' }}
        run: |
          echo "No apps changed, skipping Terraform."
          exit 0

      # 6️⃣ Loop over each changed tfvars file
      - name: Apply Terraform per app
        run: |
          for FILE in ${{ steps.changed.outputs.files }}; do
            if [ ! -f "$FILE" ]; then
              echo "File $FILE does not exist, skipping."
              continue
            fi
            echo "Processing $FILE"

            terraform init
            terraform apply -auto-approve -var-file="$FILE"
          done
