name: Terraform Apply Per App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/*.tfvars'

env:
  TF_DESTROY: false   # set to true to destroy resources

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push statefiles back

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3️⃣ Setup Terraform
      - uses: hashicorp/setup-terraform@v3

      # 4️⃣ Apply or Destroy per app (process all tfvars)
      - name: Apply or Destroy Terraform per app
        run: |
          mkdir -p statefiles

          # Loop through all tfvars in apps directory
          for FILE in apps/*.tfvars; do
            # skip if no files
            [ -f "$FILE" ] || continue

            echo "Processing $FILE"

            # Extract project_name from tfvars
            PROJECT=$(grep 'project_name' "$FILE" | awk -F '"' '{print $2}')
            STATE_FILE="statefiles/${PROJECT}.tfstate"

            echo "Using state file: $STATE_FILE"

            # Init Terraform without backend
            terraform init -backend=false

            if [ "${TF_DESTROY}" = "true" ]; then
              echo "Destroying resources for $PROJECT..."
              terraform destroy -auto-approve \
                -var-file="$FILE" \
                -state="$STATE_FILE"

              # Remove state file after destroy
              rm -f "$STATE_FILE"
            else
              echo "Applying resources for $PROJECT..."
              terraform apply -auto-approve \
                -var-file="$FILE" \
                -state="$STATE_FILE"
            fi
          done

      # 5️⃣ Commit updated state files
      - name: Commit state files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add statefiles/*.tfstate || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Terraform state files"
            git push
          fi
